name: Release

# Fires only when a version tag is pushed. Tagging is a deliberate human act —
# CI never tags (see docs/00-setup.md).
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Guard: the pushed tag must match indratrace.version.__version__. Prevents
      # tagging v0.2.0 while version.py still reads 0.1.0 — PyPI versions are
      # immutable, so a mismatched publish is unrecoverable. Fail loudly.
      # Read version.py as a standalone module (runpy) — importing the package
      # would drag in opentelemetry, which isn't installed at this step.
      - name: Assert tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(python -c "import runpy; print(runpy.run_path('src/indratrace/version.py')['__version__'])")"
          echo "tag=$tag_version  package=$pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag v$tag_version != version.py $pkg_version — refusing to build"
            exit 1
          fi

      - run: python -m pip install --upgrade pip build
      - run: python -m build

      - name: Check built metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # The PyPI trusted-publishing configuration is bound to this environment and
    # workflow filename (docs/00-setup.md). No API token anywhere in the repo.
    environment: pypi
    permissions:
      id-token: write   # mint the short-lived OIDC token PyPI trusts
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
