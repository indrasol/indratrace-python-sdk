name: indratrace-dev

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: indratrace-clickhouse
    environment:
      CLICKHOUSE_DB: otel
      # Throwaway harness credentials, not secrets (ADR 0004). Needed because
      # with no user set, the image restricts `default` to loopback only, and
      # the collector connects from another container.
      CLICKHOUSE_USER: otel
      CLICKHOUSE_PASSWORD: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: indratrace-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse-data:
